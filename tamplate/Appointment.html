
{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow-lg p-4 mx-auto" style="max-width: 600px; border-radius: 20px;">

        <h2 class="text-center text-primary mb-4">
            📅 Book Appointment
        </h2>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label class="form-label">
                    Select Doctor
                </label>

                <select
                    name="doctor"
                    class="form-select"
                    required>

                    <option value="">
                        Choose Doctor
                    </option>

                    {% for doctor in doctors %}

                    <option value="{{ doctor.id }}">
                        Dr. {{ doctor.name }}
                    </option>

                    {% endfor %}

                </select>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Select Patient
                </label>

                <select
                    name="patient"
                    class="form-select"
                    required>

                    <option value="">
                        Choose Patient
                    </option>

                    {% for patient in patients %}

                    <option value="{{ patient.id }}">
                        {{ patient.name }}
                    </option>

                    {% endfor %}

                </select>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Appointment Date
                </label>

                <input
                    type="date"
                    name="date"
                    class="form-control"
                    required>

            </div>

            <div class="text-center">

                <button
                    type="submit"
                    class="btn btn-primary px-4">

                    Book Appointment

                </button>

                <a href="{% url 'dashboard' %}"
                   class="btn btn-secondary px-4">

                    Cancel

                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}
