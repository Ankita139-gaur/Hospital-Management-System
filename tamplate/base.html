{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Hospital Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark "
style="height: 80px;width: 100%;">
    <div class="container">
        <img src="{% static 'logooo.png' %}"
     alt="Logo"
     width="65"
     height="65"
     style="
        margin-left: -10%;
        margin-right: 5%;
        object-fit:contain;"/>
        <a class="navbar-brand text-center">
            Hospital Management System
        </a>
        <a class="navbar-brand" href='/hospital/dashboard'>Dashboard</a>
        <a class="navbar-brand" href="/hospital/doctors/">Doctor List</a>
        <a class="navbar-brand" href="/hospital/patients/">Patient List</a>
        <a class="navbar-brand" href="/hospital/book-appointment/">Appointment List</a>
        <a href="\"><button
            type="submit"
            class="btn btn-success">
            Logout
        </button></a>

    </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
