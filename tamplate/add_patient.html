{% extends 'base.html' %}

{% block content %}

<style>
    .card{
    border:none;
    border-radius:20px;
}

.form-control{
    border-radius:12px;
    padding:12px;
}

.form-control:focus{
    box-shadow:0 0 10px rgba(13,110,253,0.3);
}

.btn{
    border-radius:10px;
    font-weight:600;
}

.card:hover{
    transform:translateY(-3px);
    transition:0.3s;
}
</style>
<div class="container mt-5">

    <div class="card shadow-lg p-4 mx-auto" style="max-width: 550px; border-radius: 20px;">

        <h2 class="text-center text-primary mb-4">
            👤 Add Patient
        </h2>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">
                    Patient Name
                </label>

                <input
                    type="text"
                    name="name"
                    class="form-control"
                    placeholder="Enter Patient Name"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Age
                </label>

                <input
                    type="number"
                    name="age"
                    class="form-control"
                    placeholder="Enter Age"
                    min="1"
                    max="120"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Phone Number
                </label>

                <input
                    type="tel"
                    name="phone"
                    class="form-control"
                    placeholder="Enter Phone Number"
                    required>
            </div>

            <div class="text-center">

                <button
                    type="submit"
                    class="btn btn-success px-4">

                    Save Patient

                </button>

                <a href="{% url 'dashboard' %}"
                   class="btn btn-secondary px-4">

                    Cancel

                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}
