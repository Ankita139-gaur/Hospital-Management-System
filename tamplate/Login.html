<!DOCTYPE html>
<html>
<head>
    <title>Hospital Login</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg,#4facfe,#00f2fe);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-card{
            width:400px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        .logo{
            text-align:center;
            font-size:50px;
            margin-bottom:10px;
        }

        .title{
            text-align:center;
            font-weight:bold;
            margin-bottom:25px;
        }

        .btn-login{
            width:100%;
            border-radius:10px;
        }

        .form-control{
            border-radius:10px;
        }

        .register-link{
            text-align:center;
            margin-top:15px;
        }

    </style>
</head>

<body>

<div class="login-card">

    <div class="logo">
        🏥
    </div>

    <h3 class="title">
        Hospital Management System
    </h3>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label class="form-label">
                Username
            </label>

            <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Enter Username"
                required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Password
            </label>

            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Enter Password"
                required>

        </div>

        <button
            type="submit"
            class="btn btn-primary btn-login">

            Login

        </button>

    </form>

    <div class="register-link">

        Don't have an account?

        <a href="register/">
            Register
        </a>

    </div>

</div>

</body>
</html>
