<!DOCTYPE html>
<html>
<head>

    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg,#667eea,#764ba2);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            width:450px;
            padding:35px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.2);
        }

    </style>

</head>

<body>

<div class="card">

    <h2 class="text-center mb-4">
        Create Account
    </h2>

    <form method="POST">

        {% csrf_token %}

        <input
            type="text"
            name="username"
            class="form-control mb-3"
            placeholder="Username"
            required>

        <input
            type="email"
            name="email"
            class="form-control mb-3"
            placeholder="Email"
            required>

        <input
            type="password"
            name="password"
            class="form-control mb-3"
            placeholder="Password"
            required>

        <button
            type="submit"
            class="btn btn-success w-100">

            Register

        </button>

    </form>

</div>

</body>
</html>
