
{% extends 'base.html' %}

{% block content %}
<style>
.card{
    border: none;
    border-radius: 20px;
    background-color: rgb(213, 248, 236);
}

.form-control{
    border-radius: 10px;
    padding: 10px;
}

.btn-success{
    border-radius: 10px;
    font-weight: bold;
}
</style>

<div class="container mt-5">

    <div class="card shadow-lg p-4 mx-auto" style="max-width: 500px; border-radius: 20px;">

        <h2 class="text-center mb-4 text-dark">
            Add Doctor
        </h2>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Doctor Name</label>
                <input
                    type="text"
                    name="name"
                    class="form-control"
                    placeholder="Enter Doctor Name"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">Specialization</label>
                <input
                    type="text"
                    name="specialization"
                    class="form-control"
                    placeholder="Enter Specialization"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input
                    type="text"
                    name="phone"
                    class="form-control"
                    placeholder="Enter Phone Number"
                    required>
            </div>

            <div class="text-center">
                <button
                    type="submit"
                    class="btn btn-success px-4">

                    Save Doctor

                </button>
                <a href="{% url 'dashboard' %}"
                   class="btn btn-secondary px-4">

                    Cancel

                </a>
            </div>

        </form>

    </div>

</div>

{% endblock %}
