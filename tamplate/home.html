{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hospital Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            margin:0;
            height:100vh;
            display:flex;
            /* justify-content:center; */
            align-items:center;
            background:linear-gradient(135deg,#43cea2,#185a9d);
            font-family:'Segoe UI',sans-serif;
        }

        .welcome-card{
            width:500px;
            background:white;
            border-radius:25px;
            padding:40px;
            margin-left: 20%;
            text-align:center;
            box-shadow:0 15px 35px rgba(0,0,0,0.2);
        }

        .logo{
            font-size:70px;
        }

        .title{
            color:#185a9d;
            font-weight:bold;
            margin-bottom:10px;
        }

        .subtitle{
            color:gray;
            margin-bottom:30px;
        }

        .btn-custom{
            width:100%;
            padding:12px;
            font-size:18px;
            font-weight:600;
            border-radius:12px;
            margin-top:15px;
            transition:0.3s;
        }

        .btn-custom:hover{
            transform:translateY(-3px);
        }

    </style>

</head>

<body>
    <img src="{%static 'doctor.png' %}" alt="" style="width: 500px;height: 630px;">

    <div class="welcome-card">

        <div class="logo">
            <img src="{%static 'image.png'%}" alt="" width="60" height="60">
        </div>

        <h1 class="title">
            Hospital Management System
        </h1>

        <p class="subtitle">
            Manage Doctors, Patients and Appointments Efficiently
        </p>

        <a href="{% url 'administrative_login' %}"
           class="btn btn-primary btn-custom">

            Admin Login

        </a>

        <a href="{% url 'login' %}"
           class="btn btn-success btn-custom">

            User Login

        </a>

    </div>

</body>
</html>
