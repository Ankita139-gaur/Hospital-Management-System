
{% extends 'base.html' %}

{% block content %}

<style>

.dashboard-title{
    font-size:35px;
    font-weight:bold;
    color:#2c3e50;
}

.stat-card{
    height:200px;
    border:none;
    border-radius:25px;
    color:white;
    transition:0.3s;
    box-shadow:0px 8px 20px rgba(0,0,0,0.15);
}

.stat-card:hover{
    transform:translateY(-10px);
}

.stat-card h3{
    font-size:50px;
    font-weight:bold;
    margin-top:20px;
}

.stat-card p{
    font-size:20px;
    font-weight:500;
}

.doctor-card{
    background:linear-gradient(135deg,#43cea2,#185a9d);
}

.patient-card{
    background:linear-gradient(135deg,#8e2de2,#4a00e0);
}

.appointment-card{
    background:linear-gradient(135deg,#ff9966,#ff5e62);
}

.action-btn{
    padding:12px 25px;
    border-radius:12px;
    font-weight:600;
    margin-right:10px;
}

</style>

<div class="container">

    <h2 class="dashboard-title mb-4">
        🏥 Hospital Dashboard
    </h2>

    <div class="row g-4">

        <div class="col-md-4">

            <div class="card stat-card doctor-card">

                <div class="card-body text-center">

                    <h3>{{ doctor_count }}</h3>

                    <p>👨‍⚕️ Total Doctors</p>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card stat-card patient-card">

                <div class="card-body text-center">

                    <h3>{{ patient_count }}</h3>

                    <p>🧑 Total Patients</p>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card stat-card appointment-card">

                <div class="card-body text-center">

                    <h3>{{ appointment_count }}</h3>

                    <p>📅 Appointments</p>

                </div>

            </div>

        </div>

    </div>

    <div class="mt-5">

        <a href="{% url 'add_doctor' %}"
           class="btn btn-success action-btn">
            ➕ Add Doctor
        </a>

        <a href="{% url 'add_patient' %}"
           class="btn btn-primary action-btn">
            ➕ Add Patient
        </a>

        <a href="{% url 'book_appointment' %}"
           class="btn btn-warning action-btn">
            📅 Book Appointment
        </a>

    </div>

</div>

{% endblock %}
